<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="estilos.css" />
    <title>Invitacion</title>
  </head>
  <body>
    <video id="background-video" autoplay muted loop playsinline>
      <source
        src="multimedia/Recorrido por el Museo Larco en Perú - cop.mp4"
        type="video/mp4"
      />
    </video>
    <div class="overlay"></div>

    <div class="valentines-day-card">
      <input id="open" type="checkbox" />

      <div class="card-front">
        <label class="open" for="open"></label>

        <div class="front-content">
          <svg
            class="front-ornament"
            viewBox="0 0 120 120"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <ellipse
              cx="60"
              cy="60"
              rx="50"
              ry="50"
              stroke="#c9a84c"
              stroke-width="0.6"
              stroke-dasharray="2 5"
              opacity="0.4"
            />
            <path
              d="M60 36 C54 43,42 50,42 61 C42 74,53 80,60 80 C67 80,78 74,78 61 C78 50,66 43,60 36Z"
              stroke="#c9a84c"
              stroke-width="0.9"
              fill="none"
              opacity="0.85"
            />
            <path
              d="M60 38 C66 45,76 50,78 61"
              stroke="#c9a84c"
              stroke-width="0.9"
              fill="none"
              opacity="0.3"
            />
            <path
              d="M60 38 C54 45,44 50,42 61"
              stroke="#c9a84c"
              stroke-width="0.9"
              fill="none"
              opacity="0.3"
            />
            <circle
              cx="60"
              cy="61"
              r="9"
              stroke="#c9a84c"
              stroke-width="0.7"
              fill="none"
              opacity="0.45"
            />
            <circle cx="60" cy="61" r="3" fill="#c9a84c" opacity="0.55" />
            <line
              x1="60"
              y1="80"
              x2="60"
              y2="98"
              stroke="#c9a84c"
              stroke-width="0.7"
              opacity="0.45"
            />
            <path
              d="M60 87 C53 83,46 85,46 91"
              stroke="#c9a84c"
              stroke-width="0.7"
              fill="none"
              opacity="0.45"
            />
            <path
              d="M60 91 C67 87,74 89,74 95"
              stroke="#c9a84c"
              stroke-width="0.7"
              fill="none"
              opacity="0.45"
            />
            <path
              d="M18 18 L28 18 M18 18 L18 28"
              stroke="#c9a84c"
              stroke-width="0.55"
              opacity="0.3"
            />
            <path
              d="M102 18 L92 18 M102 18 L102 28"
              stroke="#c9a84c"
              stroke-width="0.55"
              opacity="0.3"
            />
            <path
              d="M18 102 L28 102 M18 102 L18 92"
              stroke="#c9a84c"
              stroke-width="0.55"
              opacity="0.3"
            />
            <path
              d="M102 102 L92 102 M102 102 L102 92"
              stroke="#c9a84c"
              stroke-width="0.55"
              opacity="0.3"
            />
          </svg>
          <div class="front-divider"></div>
          <div class="front-title">Una velada especial</div>
          <div class="front-divider"></div>
          <div class="front-sub txt-close">Toca para cerrar</div>
          <div class="front-sub txt-open">Toca para abrir</div>
        </div>
      </div>

      <div class="card-inside">
        <label class="card-inside-label" for="open"></label>
      </div>
    </div>

    <audio id="background-music" loop muted>
      <source
        src="multimedia/Cuando se Ama - Masiel Malaga y su salsa red .mp3"
        type="audio/mp3"
      />
    </audio>

    <script>
      // ── Canvas destellos dorados ──
      const canvas = document.createElement("canvas");
      canvas.style.cssText =
        "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:999;";
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");
      const resize = () => {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
      };
      resize();
      window.addEventListener("resize", resize);

      let particles = [];
      let animating = false;
      let spreadInterval = null; // ✅ referencia única del intervalo

      const GOLDS = [
        "rgba(255,223,120,",
        "rgba(201,168,76,",
        "rgba(255,245,180,",
        "rgba(232,196,100,",
        "rgba(255,255,200,",
      ];

      function burst(cx, cy, n) {
        for (let i = 0; i < n; i++) {
          const a = Math.random() * Math.PI * 2,
            spd = 1.5 + Math.random() * 5;
          particles.push({
            x: cx,
            y: cy,
            vx: Math.cos(a) * spd,
            vy: Math.sin(a) * spd - Math.random() * 2,
            alpha: 0.95,
            decay: 0.013 + Math.random() * 0.017,
            color: GOLDS[Math.floor(Math.random() * GOLDS.length)],
            r: 1 + Math.random() * 3,
            star: Math.random() < 0.45,
            rot: Math.random() * Math.PI * 2,
            rs: (Math.random() - 0.5) * 0.15,
            g: 0.06 + Math.random() * 0.04,
            tw: Math.random() < 0.4,
          });
        }
      }

      function randomBurst() {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        burst(x, y, 25);
      }

      function drawStar(x, y, r, rot) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const a = (i / 4) * Math.PI * 2,
            b = a + Math.PI / 4;
          ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          ctx.lineTo(Math.cos(b) * (r * 0.4), Math.sin(b) * (r * 0.4));
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function loop() {
        if (!animating) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter((p) => p.alpha > 0.02);
        particles.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += p.g;
          p.vx *= 0.98;
          p.rot += p.rs;
          p.alpha -= p.decay;
          const a = p.tw
            ? p.alpha * (0.5 + 0.5 * Math.sin(Date.now() * 0.015))
            : p.alpha;
          ctx.fillStyle = p.color + a + ")";
          ctx.shadowColor = p.color + ".7)";
          ctx.shadowBlur = 5;
          p.star
            ? drawStar(p.x, p.y, p.r, p.rot)
            : (ctx.beginPath(),
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2),
              ctx.fill());
        });
        ctx.shadowBlur = 0;
        particles.length
          ? requestAnimationFrame(loop)
          : ((animating = false),
            ctx.clearRect(0, 0, canvas.width, canvas.height));
      }

      function trigger() {
        const cx = innerWidth / 2,
          cy = innerHeight / 2;

        // ✅ Limpia partículas e intervalo previo antes de empezar de nuevo
        particles = [];
        if (spreadInterval) {
          clearInterval(spreadInterval);
          spreadInterval = null;
        }

        burst(cx, cy, 140);
        setTimeout(() => burst(cx - 70, cy + 20, 55), 160);
        setTimeout(() => burst(cx + 70, cy + 20, 55), 270);

        // ✅ Un solo intervalo, guardado en variable
        spreadInterval = setInterval(() => randomBurst(), 400);

        if (!animating) {
          animating = true;
          loop();
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const cb = document.getElementById("open");
        const audio = document.getElementById("background-music");

        cb.addEventListener("change", function () {
          if (this.checked) {
            trigger();
            audio.muted = false;
            audio.play().catch((e) => console.warn(e));
          } else {
            // ✅ Al cerrar: detiene el intervalo y limpia partículas
            if (spreadInterval) {
              clearInterval(spreadInterval);
              spreadInterval = null;
            }
            particles = [];
            audio.pause();
            audio.currentTime = 0;
          }
        });
      });
    </script>
  </body>
</html>
